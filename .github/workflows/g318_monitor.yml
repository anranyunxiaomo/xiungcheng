name: 川西自驾 30分钟云端高精度天气与突发路况微信实时监控

on:
  schedule:
    # 国际标准时间每 30 分钟自动巡查检索一次 (Cron: */30 * * * *)
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  traffic_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v3

      - name: 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          pip install requests

      - name: 执行 30分钟云端高精度巡查与突发路况实时推送
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_USER_OPENID: ${{ secrets.WECHAT_USER_OPENID }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
        run: |
          python g318_monitor.py
